{% extends "base.html" %}

{% block main %}
<div class="container py-5">
  <div class="row g-4">
    <div class="col-lg-7">
      <img
        src="{{ property_image_url(property.photo) }}"
        alt="{{ property.title }}"
        class="img-fluid rounded shadow-sm w-100"
        style="max-height: 480px; object-fit: cover;"
      >
    </div>
    <div class="col-lg-5">
      <p class="text-uppercase text-success fw-semibold mb-2">{{ property.property_type }}</p>
      <h2 class="mb-3">{{ property.title }}</h2>
      <p class="text-muted mb-4">{{ property.location }}</p>
      <p class="fs-4 fw-bold">{{ property.price }}</p>

      <div class="row text-center g-3 my-4">
        <div class="col-6">
          <div class="border rounded p-3 h-100">
            <div class="small text-muted">Bedrooms</div>
            <div class="fs-4 fw-semibold">{{ property.no_of_rooms }}</div>
          </div>
        </div>
        <div class="col-6">
          <div class="border rounded p-3 h-100">
            <div class="small text-muted">Bathrooms</div>
            <div class="fs-4 fw-semibold">{{ property.no_of_bathrooms }}</div>
          </div>
        </div>
      </div>

      <p>{{ property.description }}</p>
      <div class="d-flex gap-2 flex-wrap">
        <form method="POST" action="{{ url_for('email_realtor', propertyid=property.id) }}">
          <button class="btn btn-success" type="submit">Email Realtor</button>
        </form>
        <a class="btn btn-outline-success" href="{{ url_for('properties') }}">Back to Properties</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
